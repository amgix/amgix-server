# PostgreSQL configuration optimized for high-memory systems
# and vector operations with pgvector

#------------------------------------------------------------------------------
# MEMORY SETTINGS
#------------------------------------------------------------------------------

# Shared memory for caching data pages
# Recommended: 25% of available RAM, but not more than 8GB
shared_buffers = 4GB

# Memory for sorting, hash joins, and other operations
# Per operation, so can be multiplied by concurrent operations
work_mem = 256MB

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 512MB

# How much RAM PostgreSQL thinks is available for caching
# Should be set to total system RAM minus shared_buffers
effective_cache_size = 8GB

#------------------------------------------------------------------------------
# CONNECTION SETTINGS
#------------------------------------------------------------------------------

# Listen on all addresses (required for Docker)
listen_addresses = '*'

# Maximum number of concurrent connections
max_connections = 100

#------------------------------------------------------------------------------
# VECTOR-SPECIFIC SETTINGS
#------------------------------------------------------------------------------

# Enable parallel query execution for vector operations
max_parallel_workers_per_gather = 4
max_parallel_workers = 4
max_parallel_maintenance_workers = 4

# Enable parallel index builds for vector indexes
enable_parallel_append = on
enable_parallel_hash = on

#------------------------------------------------------------------------------
# PERFORMANCE SETTINGS
#------------------------------------------------------------------------------

# Random page cost (lower for SSD storage)
random_page_cost = 1.1

# Effective I/O concurrency (higher for SSD)
effective_io_concurrency = 200

# Disable JIT for medium queries to reduce CPU overhead
jit = on

# Increase statistics quality for better plans on sparse joins
default_statistics_target = 500

# Increase temp buffers for per-session temp tables used during search
temp_buffers = 256MB

# Background writer settings
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# Checkpoint settings
checkpoint_completion_target = 0.9
wal_buffers = 16MB

#------------------------------------------------------------------------------
# VACUUM AND MAINTENANCE
#------------------------------------------------------------------------------

# Autovacuum settings for vector tables
autovacuum_max_workers = 3
autovacuum_naptime = 20s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
