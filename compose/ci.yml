# Override for CI (no GPU): index and query use CPU build and no GPU reservation.
# Use with: docker compose -f compose/qdrant.yml -f compose/ci.yml up -d
services:
  index:
    build:
      context: ..
      dockerfile: build/Dockerfile-encoder
      args:
        AMGIX_VERSION: 1.0.0-dev
        AMGIX_BUILD_ST: CPU
    volumes:
      - amgix-cache-ci:/data/amgix/cache
    deploy:
      resources:
        reservations:
          devices: !reset []

  query:
    build:
      context: ..
      dockerfile: build/Dockerfile-encoder
      args:
        AMGIX_VERSION: 1.0.0-dev
        AMGIX_BUILD_ST: CPU
    volumes:
      - amgix-cache-ci:/data/amgix/cache
    deploy:
      resources:
        reservations:
          devices: !reset []

volumes:
  amgix-cache-ci:
