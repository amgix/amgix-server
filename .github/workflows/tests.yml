# Run pytest against the full stack (Docker Compose) for each backend.
# Repo secrets required: GIST_ID, GIST_TOKEN (for VM lifecycle)
#
# To require this workflow to pass before merging PRs:
#   Settings → Branches → Branch protection rule for main → Require status checks → add "Test".
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # signal-vm:
  #   uses: ./.github/workflows/signal-vm.yml
  #   secrets: inherit

  tests:
    # needs: signal-vm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Fix workspace permissions via Docker
        run: docker run --rm -v ${{ github.workspace }}:/work alpine chown -R $(id -u):$(id -g) /work || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install -r tests/requirements.txt

      - name: Create volume directories
        run: |
          rm -rf data
          mkdir -p data/qdrant data/amgix-cache data/postgres data/mariadb
          echo "listen_addresses = '*'" > data/postgresql.conf
          touch data/mariadb.cnf
          chmod -R a+rwx data

      - name: Build shared images (api, encoder)
        run: docker compose -f compose/qdrant.yml -f compose/ci.yml build

      - name: "Test backend: Qdrant"
        run: |
          CF="-f compose/qdrant.yml -f compose/ci.yml"
          DB_SVC=qdrant
          docker compose $CF down --volumes 2>/dev/null || true
          docker compose $CF up -d
          set +e
          timeout 300 bash -c 'while true; do >/tmp/ready.json; CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; BODY=$([ "$CODE" = "000" ] && echo "(connection failed)" || cat /tmp/ready.json 2>/dev/null); echo "Waiting for Qdrant... HTTP $CODE $BODY"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          R=$?
          if [ $R -eq 124 ] && [ -f /tmp/ready.json ]; then
            FAILED=""
            [ "$(jq -r '.database' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED $DB_SVC"
            [ "$(jq -r '.rabbitmq' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED rabbitmq"
            [ "$(jq -r '.index' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED index"
            [ "$(jq -r '.query' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED query"
            if [ -n "$FAILED" ]; then echo "::error::Timed out. Logs for failed probes:"; docker compose $CF logs --tail=200 $FAILED; fi
          fi
          [ $R -eq 0 ] || exit $R
          . .venv/bin/activate && BACKEND=qdrant pytest
          docker compose $CF down --volumes

      - name: "Test backend: PostgreSQL"
        if: always()
        run: |
          CF="-f compose/pgsql.yml -f compose/ci.yml"
          DB_SVC=postgres
          docker compose $CF down --volumes 2>/dev/null || true
          docker compose $CF up -d
          set +e
          timeout 300 bash -c 'while true; do >/tmp/ready.json; CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; BODY=$([ "$CODE" = "000" ] && echo "(connection failed)" || cat /tmp/ready.json 2>/dev/null); echo "Waiting for PostgreSQL... HTTP $CODE $BODY"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          R=$?
          if [ $R -eq 124 ] && [ -f /tmp/ready.json ]; then
            FAILED=""
            [ "$(jq -r '.database' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED $DB_SVC"
            [ "$(jq -r '.rabbitmq' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED rabbitmq"
            [ "$(jq -r '.index' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED index"
            [ "$(jq -r '.query' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED query"
            if [ -n "$FAILED" ]; then echo "::error::Timed out. Logs for failed probes:"; docker compose $CF logs --tail=200 $FAILED; fi
          fi
          [ $R -eq 0 ] || exit $R
          . .venv/bin/activate && BACKEND=pgsql pytest
          docker compose $CF down --volumes

      - name: "Test backend: MariaDB"
        if: always()
        run: |
          CF="-f compose/mariadb.yml -f compose/ci.yml"
          DB_SVC=mariadb
          docker compose $CF down --volumes 2>/dev/null || true
          docker compose $CF up -d
          set +e
          timeout 300 bash -c 'while true; do >/tmp/ready.json; CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; BODY=$([ "$CODE" = "000" ] && echo "(connection failed)" || cat /tmp/ready.json 2>/dev/null); echo "Waiting for MariaDB... HTTP $CODE $BODY"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          R=$?
          if [ $R -eq 124 ] && [ -f /tmp/ready.json ]; then
            FAILED=""
            [ "$(jq -r '.database' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED $DB_SVC"
            [ "$(jq -r '.rabbitmq' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED rabbitmq"
            [ "$(jq -r '.index' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED index"
            [ "$(jq -r '.query' /tmp/ready.json 2>/dev/null)" = "false" ] && FAILED="$FAILED query"
            if [ -n "$FAILED" ]; then echo "::error::Timed out. Logs for failed probes:"; docker compose $CF logs --tail=200 $FAILED; fi
          fi
          [ $R -eq 0 ] || exit $R
          . .venv/bin/activate && BACKEND=mariadb pytest
          docker compose $CF down --volumes

