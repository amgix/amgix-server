# Run pytest against the full stack (Docker Compose) for each backend.
# Repo secrets required: GIST_ID, GIST_TOKEN (for VM lifecycle)
#
# To require this workflow to pass before merging PRs:
#   Settings → Branches → Branch protection rule for main → Require status checks → add "Test".
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # signal-vm:
  #   uses: ./.github/workflows/signal-vm.yml
  #   secrets: inherit

  tests:
    # needs: signal-vm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Fix workspace permissions via Docker
        run: docker run --rm -v ${{ github.workspace }}:/work alpine chown -R $(id -u):$(id -g) /work || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install -r tests/requirements.txt

      - name: Create volume directories
        run: |
          rm -rf data
          mkdir -p data/qdrant data/amgix-cache data/postgres data/mariadb
          echo "listen_addresses = '*'" > data/postgresql.conf
          touch data/mariadb.cnf
          chmod -R a+rwx data

      - name: Build shared images (api, encoder)
        run: docker compose -f docker-compose-qdrant.yml -f docker-compose.ci.yml build

      - name: "Test backend: Qdrant"
        run: |
          docker compose -f docker-compose-qdrant.yml -f docker-compose.ci.yml down --volumes 2>/dev/null || true
          docker compose -f docker-compose-qdrant.yml -f docker-compose.ci.yml up -d
          timeout 300 bash -c 'while true; do CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; echo "Waiting for Qdrant... HTTP $CODE $(cat /tmp/ready.json 2>/dev/null)"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          . .venv/bin/activate && BACKEND=qdrant pytest
          docker compose -f docker-compose-qdrant.yml -f docker-compose.ci.yml down --volumes

      - name: "Test backend: PostgreSQL"
        if: always()
        run: |
          docker compose -f docker-compose-pgsql.yml -f docker-compose.ci.yml down --volumes 2>/dev/null || true
          docker compose -f docker-compose-pgsql.yml -f docker-compose.ci.yml up -d
          timeout 300 bash -c 'while true; do CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; echo "Waiting for PostgreSQL... HTTP $CODE $(cat /tmp/ready.json 2>/dev/null)"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          . .venv/bin/activate && BACKEND=pgsql pytest
          docker compose -f docker-compose-pgsql.yml -f docker-compose.ci.yml down --volumes

      - name: "Test backend: MariaDB"
        if: always()
        run: |
          docker compose -f docker-compose-mariadb.yml -f docker-compose.ci.yml down --volumes 2>/dev/null || true
          docker compose -f docker-compose-mariadb.yml -f docker-compose.ci.yml up -d
          timeout 300 bash -c 'while true; do CODE=$(curl -sS -o /tmp/ready.json -w "%{http_code}" http://localhost:8234/v1/health/ready); [ "$CODE" = "200" ] && break; echo "Waiting for MariaDB... HTTP $CODE $(cat /tmp/ready.json 2>/dev/null)"; sleep 5; done; echo "Ready: $(cat /tmp/ready.json)"'
          . .venv/bin/activate && BACKEND=mariadb pytest
          docker compose -f docker-compose-mariadb.yml -f docker-compose.ci.yml down --volumes

