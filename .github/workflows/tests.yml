# Run pytest against the full stack (Docker Compose) for each backend.
# Repo secrets required: GIST_ID, GIST_TOKEN (for VM lifecycle)
#
# To require this workflow to pass before merging PRs:
#   Settings → Branches → Branch protection rule for main → Require status checks → add "Test".
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # signal-vm:
  #   uses: ./.github/workflows/signal-vm.yml
  #   secrets: inherit

  tests:
    # needs: signal-vm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        backend:
          - qdrant
          - pgsql
          - mariadb
        include:
          - backend: qdrant
            compose_file: docker-compose-qdrant.yml
          - backend: pgsql
            compose_file: docker-compose-pgsql.yml
          - backend: mariadb
            compose_file: docker-compose-mariadb.yml

    env:
      BACKEND: ${{ matrix.backend }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Fix workspace permissions via Docker
        run: docker run --rm -v ${{ github.workspace }}:/work alpine chown -R $(id -u):$(id -g) /work || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install -r tests/requirements.txt

      - name: Create volume directories
        run: |
          rm -rf data
          mkdir -p data/qdrant data/amgix-cache data/postgres data/mariadb
          echo "listen_addresses = '*'" > data/postgresql.conf
          touch data/mariadb.cnf
          chmod -R a+rwx data

      - name: Start stack (backend=${{ matrix.backend }}, CPU)
        run: docker compose -f ${{ matrix.compose_file }} -f docker-compose.ci.yml up -d --build

      - name: Wait for API to be ready
        run: |
          timeout 300 bash -c '
            until curl -fsS http://localhost:8234/v1/health/ready >/dev/null 2>&1; do
              echo "Waiting for backend=${{ matrix.backend }}..."
              sleep 5
            done
          '

      - name: Run pytest (backend=${{ matrix.backend }})
        run: . .venv/bin/activate && pytest

      - name: Stop stack
        if: always()
        run: docker compose -f ${{ matrix.compose_file }} -f docker-compose.ci.yml down --volumes

