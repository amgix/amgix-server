# Run pytest against the full stack (Docker Compose) for each backend.
# Repo secrets required: GIST_ID, GIST_TOKEN (for VM lifecycle)
#
# To require this workflow to pass before merging PRs:
#   Settings → Branches → Branch protection rule for main → Require status checks → add "Test".
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signal-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Request VM for self-hosted runner
        uses: actions/github-script@v7
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const gistId = (process.env.GIST_ID || '').trim();
            if (!gistId) throw new Error('GIST_ID secret is not set');
            const runId = process.env.GITHUB_RUN_ID;
            const fileName = `run_${runId}.json`;

            const now = new Date();
            const requestedAt = now.toISOString();
            const ONE_DAY_MS = 24 * 60 * 60 * 1000;

            const gist = await github.rest.gists.get({ gist_id: gistId });
            const existingFiles = gist.data.files || {};

            const files = {};

            for (const [name, file] of Object.entries(existingFiles)) {
              if (!name.startsWith('run_') || !name.endsWith('.json')) {
                continue;
              }
              if (name === fileName) {
                continue;
              }
              let ts = null;
              try {
                const parsed = JSON.parse(file.content || '{}');
                if (parsed && typeof parsed.requestedAt === 'string') {
                  const parsedDate = new Date(parsed.requestedAt);
                  if (!Number.isNaN(parsedDate.getTime())) {
                    ts = parsedDate;
                  }
                }
              } catch {
                // ignore parse errors and treat as stale
              }
              if (!ts || now - ts > ONE_DAY_MS) {
                files[name] = null;
              }
            }

            files[fileName] = {
              content: JSON.stringify({ requestedAt }, null, 2)
            };

            await github.rest.gists.update({
              gist_id: gistId,
              files
            });
            const refetch = await github.rest.gists.get({ gist_id: gistId });
            const refetchFiles = refetch.data.files || {};
            if (!refetchFiles[fileName]) {
              throw new Error(`Gist update returned success but GET does not show ${fileName}. Check GIST_ID and GIST_TOKEN (gist scope).`);
            }

  tests:
    needs: signal-vm
    runs-on: ubuntu-x1
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        backend:
          - qdrant
          - pgsql
          - mariadb
        include:
          - backend: qdrant
            compose_file: docker-compose-qdrant.yml
          - backend: pgsql
            compose_file: docker-compose-pgsql.yml
          - backend: mariadb
            compose_file: docker-compose-mariadb.yml

    env:
      BACKEND: ${{ matrix.backend }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Fix workspace permissions via Docker
        run: docker run --rm -v ${{ github.workspace }}:/work alpine chown -R $(id -u):$(id -g) /work || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install -r tests/requirements.txt

      - name: Create volume directories
        run: |
          rm -rf data
          mkdir -p data/qdrant data/amgix-cache data/postgres data/mariadb
          echo "listen_addresses = '*'" > data/postgresql.conf
          touch data/mariadb.cnf
          chmod -R a+rwx data

      - name: Start stack (backend=${{ matrix.backend }}, CPU)
        run: docker compose -f ${{ matrix.compose_file }} -f docker-compose.ci.yml up -d --build

      - name: Wait for API to be ready
        run: |
          timeout 300 bash -c '
            until curl -fsS http://localhost:8234/v1/health/ready >/dev/null 2>&1; do
              echo "Waiting for backend=${{ matrix.backend }}..."
              sleep 5
            done
          '

      - name: Run pytest (backend=${{ matrix.backend }})
        run: . .venv/bin/activate && pytest

      - name: Stop stack
        if: always()
        run: docker compose -f ${{ matrix.compose_file }} -f docker-compose.ci.yml down --volumes

  prune-disk:
    needs: tests
    if: always()
    runs-on: ubuntu-x1
    steps:
      - name: Remove amgix images and prune system
        run: |
          docker image ls -q --filter "reference=amgix*" | xargs -r docker rmi -f || true
          docker system prune -f

  clear-vm-request:
    needs: prune-disk
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Clear VM request for this run
        uses: actions/github-script@v7
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const gistId = process.env.GIST_ID;
            const runId = process.env.GITHUB_RUN_ID;
            const fileName = `run_${runId}.json`;

            await github.rest.gists.update({
              gist_id: gistId,
              files: { [fileName]: null }
            });
