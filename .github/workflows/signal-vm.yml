# Reusable: add run_<run_id>.json to gist to request the self-hosted VM.
# Caller must pass secrets: inherit (GIST_ID, GIST_TOKEN).
name: Signal VM

on:
  workflow_call:

jobs:
  signal-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Request VM for self-hosted runner
        uses: actions/github-script@v8
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const gistId = (process.env.GIST_ID || '').trim();
            if (!gistId) throw new Error('GIST_ID secret is not set');
            const runId = process.env.GITHUB_RUN_ID;
            const fileName = `run_${runId}.json`;

            const now = new Date();
            const requestedAt = now.toISOString();
            const ONE_DAY_MS = 24 * 60 * 60 * 1000;

            const gist = await github.rest.gists.get({ gist_id: gistId });
            const existingFiles = gist.data.files || {};

            const files = {};

            for (const [name, file] of Object.entries(existingFiles)) {
              if (!name.startsWith('run_') || !name.endsWith('.json')) {
                continue;
              }
              if (name === fileName) {
                continue;
              }
              let ts = null;
              try {
                const parsed = JSON.parse(file.content || '{}');
                if (parsed && typeof parsed.requestedAt === 'string') {
                  const parsedDate = new Date(parsed.requestedAt);
                  if (!Number.isNaN(parsedDate.getTime())) {
                    ts = parsedDate;
                  }
                }
              } catch {
                // ignore parse errors and treat as stale
              }
              if (!ts || now - ts > ONE_DAY_MS) {
                files[name] = null;
              }
            }

            files[fileName] = {
              content: JSON.stringify({ requestedAt }, null, 2)
            };

            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            const updateRes = await github.rest.gists.update({
              gist_id: gistId,
              files
            });
            const fromUpdate = updateRes.data.files || {};
            if (fromUpdate[fileName]) {
              return;
            }

            const delaysMs = [500, 1500, 3000, 5000];
            let refetchFiles = {};
            for (const ms of delaysMs) {
              await sleep(ms);
              const refetch = await github.rest.gists.get({ gist_id: gistId });
              refetchFiles = refetch.data.files || {};
              if (refetchFiles[fileName]) {
                return;
              }
            }

            const keys = Object.keys(refetchFiles).sort().join(', ');
            throw new Error(
              `Gist update succeeded but ${fileName} not visible after verify (update body and ${delaysMs.length} GET retries). ` +
                `If keys are empty or stale, suspect API lag; otherwise check gist state. Last GET file keys: ${keys || '(none)'}`
            );
