        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.ref_type }}" != "tag" ] || [[ ! "${{ github.ref_name }}" =~ ^v ]]; then
            echo "This workflow only runs on tags starting with v (e.g. v1.0.0). Ref: ${{ github.ref }}"
            exit 1
          fi
          REF="${{ github.ref_name }}"
          echo "VERSION=$REF" >> $GITHUB_ENV
          echo "AMGIX_VERSION=${REF#v}" >> $GITHUB_ENV
          echo "Image tag: $REF, build-arg AMGIX_VERSION=${REF#v}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amgix-encoder (CPU)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile-encoder
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amgix-encoder:${{ env.VERSION }}
          build-args: |
            AMGIX_VERSION=${{ env.AMGIX_VERSION }}
            AMGIX_BUILD_FE=CPU
            AMGIX_BUILD_ST=CPU

  build-one-cpu:
    needs: build-encoder-cpu
    runs-on: ubuntu-x1
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.ref_type }}" != "tag" ] || [[ ! "${{ github.ref_name }}" =~ ^v ]]; then
            echo "This workflow only runs on tags starting with v (e.g. v1.0.0). Ref: ${{ github.ref }}"
