          build-args: |
            AMGIX_VERSION=${{ env.AMGIX_VERSION }}
            AMGIX_BUILD_ST=GPU

  clear-vm-request:
    needs: build-one-gpu
    if: always()
    uses: ./.github/workflows/clear-vm-request.yml
    secrets: inherit
