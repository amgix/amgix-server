# Build Amgix server images and push to Docker Hub.
# Repo secrets required: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
name: Build containers

on:
  push:
    tags: ['v*']

jobs:
  # require-tests-passed:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Require successful Test workflow for this commit
#       uses: actions/github-script@v8
  #       with:
  #         script: |
  #           const sha = context.sha;
  #           const { data } = await github.rest.actions.listWorkflowRunsForRepo({
  #             owner: context.repo.owner,
  #             repo: context.repo.repo,
  #             head_sha: sha,
  #             status: 'completed',
  #             per_page: 50
  #           });
  #           const testRun = data.workflow_runs.find(
  #             (r) => r.name === 'Run Tests' && r.conclusion === 'success'
  #           );
  #           if (!testRun) {
  #             throw new Error(
  #               'No successful Run Tests workflow found for this commit. Run Tests on main must pass before building containers for a tag.'
  #             );
  #           }

  signal-vm:
    # needs: require-tests-passed
    uses: ./.github/workflows/signal-vm.yml
    secrets: inherit

  build-small:
    needs: signal-vm
    runs-on: ubuntu-x1
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.ref_type }}" != "tag" ] || [[ ! "${{ github.ref_name }}" =~ ^v ]]; then
            echo "This workflow only runs on tags starting with v (e.g. v1.0.0). Ref: ${{ github.ref }}"
            exit 1
          fi
          REF="${{ github.ref_name }}"
          echo "VERSION=$REF" >> $GITHUB_ENV
          echo "AMGIX_VERSION=${REF#v}" >> $GITHUB_ENV
          echo "Image tag: $REF, build-arg AMGIX_VERSION=${REF#v}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Small images: api, encoder-noembed, one-noembed
      - name: Build and push amgix-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile-api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amgix-api:${{ env.VERSION }}
          build-args: |
            AMGIX_VERSION=${{ env.AMGIX_VERSION }}

      - name: Build and push amgix-encoder (NoEmbed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile-encoder
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amgix-encoder:${{ env.VERSION }}-noembed
          build-args: |
            AMGIX_VERSION=${{ env.AMGIX_VERSION }}
            AMGIX_BUILD_FE=
            AMGIX_BUILD_ST=

      - name: Build and push amgix-one (NoEmbed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/one/Dockerfile-one
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amgix-one:${{ env.VERSION }}-noembed
          build-args: |
            AMGIX_VERSION=${{ env.AMGIX_VERSION }}
            AMGIX_BUILD_ST=

  build-encoder-gpu:
    needs: build-small
    runs-on: ubuntu-x1
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
