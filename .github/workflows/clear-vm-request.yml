# Reusable: remove run_<run_id>.json from gist to release the VM.
# Caller must pass secrets: inherit (GIST_ID, GIST_TOKEN).
name: Clear VM request

on:
  workflow_call:

jobs:
  clear-vm-request:
    runs-on: ubuntu-latest
    steps:
      - name: Clear VM request for this run
        uses: actions/github-script@v7
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const gistId = process.env.GIST_ID;
            const runId = process.env.GITHUB_RUN_ID;
            const fileName = `run_${runId}.json`;

            await github.rest.gists.update({
              gist_id: gistId,
              files: { [fileName]: null }
            });
